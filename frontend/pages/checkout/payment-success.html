<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kết Quả Thanh Toán - bTap Shop</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../../assets/css/style.css">
    <link rel="stylesheet" href="./payment-success.css">
</head>

<body>
    <app-header></app-header>

    <main class="payment-result-main">
        <section class="result-card" id="payment-result-card">
            <div class="result-status-icon" id="result-icon" aria-hidden="true">
                <i class="fas fa-circle-check"></i>
            </div>
            <p class="result-pill" id="result-pill">MoMo Payment</p>
            <h1 id="result-title">Thanh toán thành công</h1>
            <p class="result-description" id="result-description"></p>

            <div class="result-meta">
                <div class="meta-item">
                    <span>Mã đơn hàng</span>
                    <strong id="order-code">---</strong>
                </div>
            </div>
            <div class="result-actions">
                <a href="/pages/profile/orders.html" class="result-btn primary">
                    <i class="fas fa-receipt"></i> Xem đơn hàng của tôi
                </a>
                <a href="/index.html" class="result-btn secondary">
                    <i class="fas fa-house"></i> Tiếp tục mua sắm
                </a>
            </div>
        </section>
    </main>

    <app-footer></app-footer>
    <script src="../../assets/js/api.js"></script>
    <script src="../../components/components.js"></script>
    <script src="./payment-success.js"></script>
</body>

</html>
