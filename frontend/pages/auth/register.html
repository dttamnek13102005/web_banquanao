<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký - bTap</title>
    <link rel="stylesheet" href="../../assets/css/style.css">
    <link rel="stylesheet" href="register.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <div class="container">
        <header>
            <div class="nav-logo">
                <a href="../../index.html"><img src="../../assets/images/logo.svg" alt="bTap Logo"></a>
            </div>
            <div class="nav-title">Đăng Ký</div>
        </header>

        <div class="register-form">
            <main>
                <div class="register-icon">
                    <i class="fas fa-user-plus"></i>
                </div>
                <header>
                    <h1>Tạo Tài Khoản</h1>
                    <span>Nhập thông tin để đăng ký tài khoản mới</span>
                </header>

                <div id="register-error" class="error-message" style="display: none;">
                    <i class="fas fa-exclamation-circle"></i> <span id="register-error-text"></span>
                </div>

                <div id="register-success" class="success-message" style="display: none;">
                    <i class="fas fa-check-circle"></i> <span id="register-success-text">Đăng ký thành công! Đang chuyển
                        hướng...</span>
                </div>

                <form id="registerForm">
                    <div class="form-group">
                        <label for="username"><i class="fas fa-at"></i> Tên đăng nhập <span
                                class="required">*</span></label>
                        <input type="text" id="username" name="username" required placeholder="Nhập tên đăng nhập">
                    </div>
                    <div class="form-group">
                        <label for="email"><i class="fas fa-envelope"></i> Email <span class="required">*</span></label>
                        <input type="email" id="email" name="email" required placeholder="example@email.com">
                    </div>

                    <div class="form-group">
                        <label for="password"><i class="fas fa-lock"></i> Mật khẩu <span
                                class="required">*</span></label>
                        <div class="password-wrapper">
                            <input type="password" id="password" name="password" required placeholder="Ít nhất 6 ký tự">
                            <button type="button" class="toggle-password" onclick="togglePassword('password')">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="confirm_password"><i class="fas fa-lock"></i> Xác nhận mật khẩu <span
                                class="required">*</span></label>
                        <div class="password-wrapper">
                            <input type="password" id="confirm_password" name="confirm_password" required
                                placeholder="Nhập lại mật khẩu">
                            <button type="button" class="toggle-password" onclick="togglePassword('confirm_password')">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                    </div>
                    <div class="form-group form-submit">
                        <button type="submit" class="btn-submit">
                            <i class="fas fa-user-plus"></i> Đăng Ký
                        </button>
                    </div>
                </form>
                <div class="additional-options">
                    <div class="gach-ngang">
                        <hr>
                        <p>HOẶC</p>
                        <hr>
                    </div>
                    <p>Đã có tài khoản? <a href="login.html">Đăng nhập ngay</a></p>
                </div>
            </main>
        </div>

        <footer class="register-footer">
            <div class="footer-content">
                <p class="footer-info">
                    <i class="fas fa-code"></i> Phát triển bởi: <strong>Nhóm 74DCTT21</strong>
                </p>
                <p class="footer-members">
                    <span>Đặng Thành Tâm</span> • <span>Triệu Quang Ninh</span> • <span>Bùi Đức Huy</span> • <span>Lê
                        Mạnh Hùng</span> • <span>Nguyễn Hồng Sơn</span>
                </p>
            </div>
        </footer>
    </div>

    <script src="../../assets/js/api.js"></script>
    <script src="auth.js"></script>
    <script>
        function togglePassword(inputId) {
            const input = document.getElementById(inputId);
            const icon = input.nextElementSibling.querySelector('i');
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        }
    </script>
</body>

</html>
