<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chi tiết sản phẩm</title>
    <link rel="stylesheet" href="../../assets/css/style.css">
    <link rel="stylesheet" href="./productdetail.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <app-header></app-header>

    <div class="container" id="page-container">
        <nav class="breadcrumb" aria-label="Breadcrumb">
            <ol>
                <li><a href="/index.html"><i class="fas fa-home"></i> Trang chủ</a></li>
                <li><span class="separator"><i class="fas fa-chevron-right"></i></span></li>
                <li><a href="#" id="breadcrumb-category">Danh mục</a></li>
                <li><span class="separator"><i class="fas fa-chevron-right"></i></span></li>
                <li><span class="current" id="breadcrumb-product">Sản phẩm</span></li>
            </ol>
        </nav>

        <!-- Loading state -->
        <div class="product-loading" id="loading-state">
            <div class="spinner"></div>
            <p>Đang tải sản phẩm...</p>
        </div>

        <div class="product-error" id="error-state" style="display: none;">
            <i class="fas fa-exclamation-circle"></i>
            <p id="error-message">Không tìm thấy sản phẩm.</p>
            <a href="/index.html" class="btn-primary"><i class="fas fa-arrow-left"></i> Về trang chủ</a>
        </div>

        <div class="product" id="product-detail" style="display: none;">
            <div class="img-product">
                <div class="main-image-wrapper" id="main-image-wrapper">
                    <span class="discount-badge" id="discount-badge" style="display:none;"></span>
                    <img id="main-image" src="" alt="Ảnh sản phẩm">
                </div>
            </div>
            <div class="info-product">
                <h1 id="product-name"></h1>

                <div class="ratting">
                    <div class="ratting-star">
                        <span id="rating-score">0</span>
                        <div class="star" id="star-icons"></div>
                    </div>
                    <span class="ratting-count" id="rating-count"></span>
                </div>

                <div class="price">
                    <span class="price-sale" id="price-sale"></span>
                    <span class="price-original" id="price-original" style="display:none;"></span>
                    <span class="price-discount" id="price-discount" style="display:none;"></span>
                </div>
                <div class="variant-group" id="group-mausac" style="display:none;">
                    <label>Màu sắc</label>
                    <div class="variant-options" id="options-mausac"></div>
                </div>
                <div class="variant-group" id="group-kichthuoc" style="display:none;">
                    <label>Kích thước</label>
                    <div class="variant-options" id="options-kichthuoc"></div>
                </div>
                <div class="stock variant-group">
                    <label>Tình trạng</label>
                    <div id="stock-status"></div>
                </div>

                <div class="variant-group quantity">
                    <label>Số lượng</label>
                    <div class="quantity-controls">
                        <button class="qty-btn" id="btn-minus"><i class="fas fa-minus"></i></button>
                        <input type="number" class="qty-input" id="qty-input" value="1" min="1">
                        <button class="qty-btn" id="btn-plus"><i class="fas fa-plus"></i></button>
                    </div>
                </div>

                <div class="product-actions">
                    <button class="btn-add-cart" id="btn-add-cart">
                        <i class="fas fa-shopping-cart"></i> Thêm vào giỏ
                    </button>
                    <button class="btn-buy-now" id="btn-buy-now">
                        <i class="fas fa-bolt"></i> Mua ngay
                    </button>
                </div>
            </div>
        </div>

        <!-- Mô tả sản phẩm -->
        <div class="mota" id="product-mota" style="display:none;">
            <h2><i class="fas fa-align-left"></i> Mô tả sản phẩm</h2>
            <div class="mota-content" id="mota-content"></div>
        </div>

    </div>

    <app-footer></app-footer>
    <script src="../../assets/js/image.js"></script>
    <script src="../../assets/js/api.js"></script>
    <script src="../../components/components.js"></script>
    <script src="./productdetail.js"></script>
</body>

</html>
